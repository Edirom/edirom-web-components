<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Component Tester</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
        }
        edirom-web-component-demo {
            display: block;
            width: 100%;
            height: 100%;
            margin-left: 20px;
        }
        edirom-openseadragon {
            display: block;
            width: 100%;
            height: 600px;
        }
    </style>

    <!-- script for demo container web component -->
    <script src="../edirom-web-component-demo/edirom-web-component-demo.js"></script>
    
    <!-- CUSTOM: Insert script for the web component here -->
    <!-- <script src="path/to/web-component.js"></script> -->
    <script src="../edirom-image-viewer/edirom-image-viewer.js"></script>

</head>
<body>

    <edirom-web-component-demo>
        <edirom-openseadragon 
            id="viewer"
            pagenumber="1"
            zoom="1"
            triggernextpage="false"
            triggerpreviouspage="false"
            triggerfullscreen="false"
            preserveviewport="true"
            visibilityratio="1"
            minzoomlevel="0.5"
            maxzoomlevel="10"
            shownavigationcontrol="true"
            sequencemode="true"
            clicktozoom="false" 
            shownavigator="true" 
            showzoomcontrol="true" 
            showhomecontrol="true" 
            showfullpagecontrol="true" 
            showsequencecontrol="true" 
            tilesources='["https://content.staatsbibliothek-berlin.de/dc/69007087X-0001/info.json", "https://content.staatsbibliothek-berlin.de/dc/69007087X-0002/info.json"]'>
        </edirom-openseadragon>
    </edirom-web-component-demo>

</body>
</html>
